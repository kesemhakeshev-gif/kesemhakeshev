<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קוסם המשימות | קסם הקשב</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #f0f7ff; padding-bottom: 100px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .priority-urgent { border-right: 8px solid #ef4444; background: #fef2f2; }
        .priority-important { border-right: 8px solid #f59e0b; background: #fffbeb; }
        .priority-schedule { border-right: 8px solid #3b82f6; background: #eff6ff; }
        .day-cell { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; background: #fff; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    </style>
</head>
<body class="text-right">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🪄</span>
            <h1 class="text-xl font-black text-blue-600">קוסם המשימות</h1>
        </div>
        <div class="bg-blue-600 text-white px-4 py-1 rounded-full font-black shadow-lg">✨ <span id="score-display">0</span></div>
    </nav>

    <main class="container mx-auto px-4 max-w-xl pt-6">
        
        <section id="view-dump" class="tab-content active">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-yellow-300">
                <h2 class="text-2xl font-black mb-2 text-blue-900 italic">פנקס הבלאגן</h2>
                <textarea id="taskInput" class="w-full h-64 p-5 bg-blue-50/30 rounded-3xl outline-none text-xl border-2 border-transparent focus:border-blue-200" placeholder="לסדר את המחסן...&#10;לקבוע תור לרופא..."></textarea>
                <button onclick="startSorting()" class="w-full mt-6 bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-xl">סדר לי את הראש ✨</button>
            </div>
        </section>

        <section id="view-sort" class="tab-content text-center">
            <div class="bg-gradient-to-b from-blue-400 to-blue-600 p-8 rounded-[3rem] shadow-2xl min-h-[450px] flex flex-col justify-between items-center relative">
                <div id="current-bubble" class="bg-white p-10 rounded-full shadow-2xl max-w-[280px] min-w-[180px] aspect-square flex items-center justify-center font-extrabold text-blue-900 text-2xl leading-tight"></div>
                <div class="w-full space-y-4">
                    <input type="date" id="datePicker" class="hidden">
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="assignCategory('urgent')" class="bg-red-500 text-white p-4 rounded-2xl text-sm font-black shadow-lg">🔥 דחוף</button>
                        <button onclick="assignCategory('important')" class="bg-amber-400 text-white p-4 rounded-2xl text-sm font-black shadow-lg">⭐ חשוב</button>
                        <button onclick="triggerDatePicker()" class="bg-white text-blue-600 p-4 rounded-2xl text-sm font-black shadow-lg">📅 יומן</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-list" class="tab-content">
            <h2 class="text-2xl font-black text-blue-900 mb-6 italic">המשימות שלי 📋</h2>
            <div id="organized-tasks" class="space-y-6"></div>
        </section>

        <section id="view-calendar" class="tab-content">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl">
                <h2 class="text-xl font-black text-blue-900 mb-6 italic text-center">היומן שלי 📅</h2>
                <div id="calendar-days" class="calendar-grid"></div>
            </div>
        </section>

    </main>

    <div id="subtask-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl">
            <h3 id="modal-task-title" class="text-xl font-black text-blue-900 mb-4 leading-tight"></h3>
            
            <div id="subtask-list" class="space-y-3 mb-6 max-h-60 overflow-y-auto"></div>
            
            <div class="bg-gray-50 p-4 rounded-2xl mb-4">
                <input id="new-subtask" type="text" class="w-full bg-transparent outline-none font-bold text-blue-600" placeholder="הקלד שלב ולחץ Enter..." onkeypress="if(event.key === 'Enter') addSubTask()">
            </div>

            <div id="timer-box" class="hidden p-6 bg-blue-600 rounded-[2rem] text-center text-white shadow-inner">
                <div id="timer-clock" class="text-4xl font-black mb-2">00:00</div>
                <div id="timer-label" class="text-[10px] opacity-80 mb-4">זמן עבודה על השלב הנוכחי</div>
                <button id="timer-complete-btn" class="bg-white text-blue-600 px-6 py-2 rounded-xl font-black text-sm">סיימתי את השלב! ✅</button>
            </div>

            <button onclick="closeSubtasks()" class="w-full mt-4 text-gray-400 text-xs underline">חזרה לרשימה</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t flex justify-around p-4 z-50 rounded-t-[2rem]">
        <button onclick="switchTab('dump', this)" class="nav-item active flex flex-col items-center gap-1"><span class="text-xl">📝</span><span class="text-[10px] font-bold">פנקס</span></button>
        <button onclick="switchTab('list', this)" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">📋</span><span class="text-[10px] font-bold">משימות</span></button>
        <button onclick="switchTab('calendar', this)" class="nav-item flex flex-col items-center gap-1"><span class="text-xl">📅</span><span class="text-[10px] font-bold">יומן</span></button>
    </nav>

    <script>
        let score = parseInt(localStorage.getItem('k_score')) || 0;
        let tasks = JSON.parse(localStorage.getItem('k_tasks')) || [];
        let sortingQueue = [];
        let activeTaskId = null;
        let activeSubId = null;
        let startTime = null;
        let timerInterval = null;

        function save() {
            localStorage.setItem('k_tasks', JSON.stringify(tasks));
            localStorage.setItem('k_score', score);
            document.getElementById('score-display').innerText = score;
        }

        function switchTab(viewId, btn) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(btn) btn.classList.add('active');
            if(viewId === 'list') renderTasks();
            if(viewId === 'calendar') renderCalendar();
        }

        function startSorting() {
            const val = document.getElementById('taskInput').value;
            if(!val.trim()) return;
            sortingQueue = val.split('\n').filter(l => l.trim() !== "");
            document.getElementById('taskInput').value = "";
            switchTab('sort'); nextBubble();
        }

        function nextBubble() {
            if(sortingQueue.length === 0) { switchTab('list'); return; }
            document.getElementById('current-bubble').innerText = sortingQueue[0];
        }

        function triggerDatePicker() {
            const p = document.getElementById('datePicker');
            p.classList.remove('hidden'); p.showPicker();
            p.onchange = () => { assignCategory('schedule', p.value); p.classList.add('hidden'); };
        }

        function assignCategory(cat, date = null) {
            const text = sortingQueue.shift();
            tasks.push({ id: Date.now() + Math.random(), text, category: cat, date, completed: false, subtasks: [] });
            save(); nextBubble();
        }

        function renderTasks() {
            const container = document.getElementById('organized-tasks');
            const categories = { urgent: "🔥 דחוף!", important: "⭐ חשוב", schedule: "📅 ביומן" };
            let html = "";
            for (let [key, title] of Object.entries(categories)) {
                const catTasks = tasks.filter(t => t.category === key && !t.completed);
                if(catTasks.length > 0) {
                    html += `<h3 class="text-xs font-bold text-gray-400 mt-4 mb-2">${title}</h3>`;
                    catTasks.forEach(t => {
                        html += `<div class="p-5 rounded-[2rem] shadow-md flex justify-between bg-white border-r-8 ${key==='urgent'?'border-red-500':key==='important'?'border-amber-400':'border-blue-400'}">
                            <div onclick="openSubtasks(${t.id})" class="flex-1 cursor-pointer">
                                <p class="font-bold text-blue-900">${t.text}</p>
                                <p class="text-[10px] opacity-40">${t.subtasks.filter(s=>s.completed).length}/${t.subtasks.length} שלבים הושלמו</p>
                            </div>
                            <button onclick="completeMainTask(${t.id})" class="text-2xl">⭕</button>
                        </div>`;
                    });
                }
            }
            container.innerHTML = html || "<p class='text-center opacity-30 py-10'>הכל נקי!</p>";
        }

        function openSubtasks(id) {
            activeTaskId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('modal-task-title').innerText = task.text;
            renderSubtasks();
            document.getElementById('subtask-modal').classList.remove('hidden');
            document.getElementById('new-subtask').focus();
        }

        function renderSubtasks() {
            const task = tasks.find(t => t.id === activeTaskId);
            const container = document.getElementById('subtask-list');
            container.innerHTML = task.subtasks.map(s => `
                <div class="flex justify-between items-center p-4 rounded-2xl ${s.completed ? 'bg-green-50 opacity-60' : 'bg-gray-50'}">
                    <div>
                        <p class="text-sm font-bold">${s.text}</p>
                        ${s.timeTaken ? `<p class="text-[9px] text-green-600 font-black">זמן: ${s.timeTaken}</p>` : ''}
                    </div>
                    ${!s.completed ? `<button onclick="initiateTimer(${s.id})" class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-lg font-black">התחל ▶️</button>` : '✅'}
                </div>
            `).join('');
        }

        function addSubTask() {
            const input = document.getElementById('new-subtask');
            if(!input.value.trim()) return;
            const task = tasks.find(t => t.id === activeTaskId);
            task.subtasks.push({ id: Date.now(), text: input.value, completed: false, timeTaken: null });
            input.value = ""; input.focus();
            renderSubtasks(); save();
        }

        function initiateTimer(subId) {
            activeSubId = subId;
            startTime = Date.now();
            document.getElementById('timer-box').classList.remove('hidden');
            document.getElementById('timer-complete-btn').onclick = () => finishSubTask(subId);
            
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = Math.floor(elapsed / 60), s = elapsed % 60;
                document.getElementById('timer-clock').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        }

        function finishSubTask(subId) {
            clearInterval(timerInterval);
            const task = tasks.find(t => t.id === activeTaskId);
            const sub = task.subtasks.find(s => s.id === subId);
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60), s = elapsed % 60;
            sub.timeTaken = `${m} דק' ו-${s} שנ'`;
            sub.completed = true;
            
            score += 30;
            document.getElementById('timer-box').classList.add('hidden');
            save(); renderSubtasks();
            
            // Auto-focus next subtask if exists
            const next = task.subtasks.find(s => !s.completed);
            if(next) { initiateTimer(next.id); } 
            else { alert("כל הכבוד! סיימת את כל השלבים של המשימה!"); }
        }

        function completeMainTask(id) {
            tasks.find(t => t.id === id).completed = true;
            score += 150; save(); renderTasks();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            container.innerHTML = "";
            for(let i=1; i<=30; i++) {
                const dateStr = `2026-04-${i < 10 ? '0'+i : i}`;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                const icons = dayTasks.map(t => t.completed ? '⭐' : '▲').join('');
                container.innerHTML += `<div class="day-cell border ${dayTasks.length > 0 ? 'border-blue-300 bg-blue-50' : 'border-gray-100'}">
                    <span class="opacity-30">${i}</span><div class="text-[8px]">${icons}</div></div>`;
            }
        }

        function closeSubtasks() { document.getElementById('subtask-modal').classList.add('hidden'); clearInterval(timerInterval); }
        document.getElementById('score-display').innerText = score;
    </script>
</body>
</html>
